<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแปลงข้อสอบ — โรงเรียนพระมารดานิจจานุเคราะห์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
:root {
  --navy: #0a1628;
  --accent: #e8b84b;
  --accent2: #f5d07a;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --text: #e8eaf0;
  --text2: #8892a4;
  --green: #4ade80;
  --red: #f87171;
  --r: 16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(30,58,95,.6),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 100%,rgba(232,184,75,.07),transparent 50%);pointer-events:none}

.topbar{position:relative;z-index:10;display:flex;align-items:center;gap:16px;padding:16px 28px;background:rgba(10,22,40,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Sarabun',sans-serif;font-size:20px;color:var(--navy);font-weight:700;flex-shrink:0;box-shadow:0 4px 14px rgba(232,184,75,.3)}
.topbar-title{font-size:18px;font-weight:700}
.topbar-sub{font-size:14px;color:var(--text2);margin-top:2px}
.topbar-gem{margin-left:auto;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.3);color:var(--accent);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.topbar-gem::before{content:'';width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
#btnPrintTop{display:none;margin-left:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);border:none;border-radius:10px;padding:10px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;box-shadow:0 4px 12px rgba(232,184,75,.3);transition:all .2s}
#btnPrintTop:hover{transform:translateY(-1px)}

.tabs{position:relative;z-index:10;display:flex;gap:6px;padding:16px 28px 0;background:rgba(10,22,40,.5)}
.tab{padding:14px 24px;border:none;border-radius:12px 12px 0 0;background:transparent;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:500;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--text);background:var(--glass)}
.tab.active{color:var(--text);background:rgba(255,255,255,.07);border-bottom:3px solid var(--accent)}
.badge{background:var(--accent);color:var(--navy);border-radius:12px;padding:2px 8px;font-size:12px;font-weight:700;display:none}

.main{position:relative;z-index:5;max-width:1400px;margin:0 auto;padding:30px}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.main{padding:16px}}

.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:28px;backdrop-filter:blur(10px)}
.card-title{font-size:15px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.card-icon{width:32px;height:32px;background:rgba(232,184,75,.14);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}

.upload-zone{
  position:relative;
  border:3px dashed rgba(232,184,75,.5);
  border-radius:var(--r);
  background:linear-gradient(135deg,rgba(232,184,75,.1),rgba(232,184,75,.04));
  padding:48px 24px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:18px;
}
.upload-zone:hover,.upload-zone.over{
  border-color:var(--accent);
  background:linear-gradient(135deg,rgba(232,184,75,.18),rgba(232,184,75,.08));
  transform:scale(1.01);
}
.upload-zone input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3;}
.upload-zone-icon{font-size:54px;margin-bottom:12px;line-height:1}
.upload-zone-title{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px}
.upload-zone-sub{font-size:15px;color:var(--text2);margin-bottom:18px}
.upload-zone-pill{
  display:inline-block;
  background:var(--accent);color:var(--navy);
  font-size:16px;font-weight:700;
  padding:12px 34px;border-radius:25px;
  box-shadow:0 4px 14px rgba(232,184,75,.4);
  pointer-events:none;
}

.file-status{display:none;align-items:center;gap:12px;padding:12px 16px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.22);border-radius:12px;margin-bottom:16px}
.file-status-name{font-size:15px;font-weight:700;color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.file-status-meta{font-size:13px;color:var(--text2)}

.text-toggle{display:none;background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;font-family:'Sarabun',sans-serif;padding:6px 0;align-items:center;gap:6px;margin-bottom:8px}
.text-toggle:hover{color:var(--text)}
.text-box{display:none;max-height:140px;overflow-y:auto;background:rgba(0,0,0,.3);border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap;margin-bottom:16px}

.btn-convert{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);border:none;border-radius:12px;font-family:'Sarabun',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 5px 18px rgba(232,184,75,.25)}
.btn-convert:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,184,75,.35)}
.btn-convert:disabled{background:rgba(255,255,255,.08);color:var(--text2);cursor:not-allowed;box-shadow:none;transform:none}
.spinner{width:20px;height:20px;border:3px solid rgba(10,22,40,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{display:none;margin-top:12px;padding:12px 16px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;color:var(--red);font-size:15px}

.form-fields{display:flex;flex-direction:column;gap:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.field input{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:16px;font-family:'Sarabun',sans-serif;outline:none;transition:border .2s}
.field input:focus{border-color:var(--accent)}
.field textarea{font-size:16px; padding:12px 16px;}

.preview-layout{display:grid;grid-template-columns:350px 1fr;gap:24px;align-items:start}
@media(max-width:900px){.preview-layout{grid-template-columns:1fr}}
.editor-panel{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-height:calc(100vh - 180px);display:flex;flex-direction:column}
.editor-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.editor-head h4{font-size:15px;color:var(--text2);font-weight:600}
.btn-add-q{background:rgba(232,184,75,.14);border:1px solid rgba(232,184,75,.3);color:var(--accent);border-radius:8px;padding:6px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif}
.q-list{overflow-y:auto;flex:1;padding:14px}
.q-item{margin-bottom:8px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:rgba(0,0,0,.2)}
.q-head{padding:12px 16px;display:flex;align-items:center;cursor:pointer;gap:8px}
.q-head:hover{background:rgba(255,255,255,.03)}
.q-num{background:rgba(232,184,75,.14);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700;flex-shrink:0}
.q-snip{color:var(--text2);font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.btn-del{background:none;border:none;cursor:pointer;color:rgba(248,113,113,.45);font-size:18px;padding:0 4px;line-height:1;transition:color .2s}
.btn-del:hover{color:var(--red)}
.q-body{display:none;padding:14px 16px;border-top:1px solid var(--border)}
.q-body.open{display:block}
.q-field{margin-bottom:10px}
.q-field label{display:block;font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;margin-bottom:4px}
.q-field input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;font-family:'Sarabun',sans-serif;outline:none}
.q-field input:focus{border-color:var(--accent)}
.empty-state{text-align:center;padding:100px 20px;color:var(--text2)}
.empty-icon{font-size:64px;margin-bottom:18px;opacity:.4}

.paper-wrap{
  background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
  padding:24px;overflow-y:auto;overflow-x:hidden;
  max-height:calc(100vh - 180px);
  -webkit-overflow-scrolling:touch;
}

.paper{
  background:#fff;
  border-radius:6px;
  color:#000;
  font-family:'Sarabun',sans-serif;
  font-size:21px;
  line-height:1.5;
  font-weight:normal;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  width:816px;       
  height:1248px;
  padding:54px 62px; 
  margin:0 auto 24px auto;
  box-sizing:border-box;
  position:relative;
  transform-origin:top center;
  transition:none;
  overflow:hidden;
}

.p-school{font-size:16pt;font-weight:bold;font-family:'TH Sarabun PSK', 'Sarabun', sans-serif;text-align:center;margin-bottom:2px}
.p-row{font-size:16pt;font-weight:bold;font-family:'TH Sarabun PSK', 'Sarabun', sans-serif;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:2px}
.p-row.bdr{border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}
.p-subhead{font-size:16pt;font-weight:bold;font-family:'TH Sarabun PSK', 'Sarabun', sans-serif;display:flex;justify-content:space-between;margin-bottom:4px}
.p-subhead-line{border-bottom:2px solid #000;margin-bottom:10px}
..p-inst{font-size:14pt;font-weight:normal;text-decoration:none;font-family:'TH Sarabun PSK', 'Sarabun', sans-serif;margin-bottom:12px}

.exam-cols{column-count:2;column-gap:24px;column-rule:1px solid #ccc}
.exam-single{column-count:1}
.q-block{break-inside:avoid;margin-bottom:12px}
.q-text{font-weight:normal;margin-bottom:3px;padding-left:2.2em;text-indent:-2.2em;display:block;}
.q-choices{padding-left:1em}
.q-choice{margin:2px 0;padding-left:1.8em;text-indent:-1.8em;display:block;}

/* ═══ PRINT STYLES ═══ 
   แก้ปัญหาหน้าเปล่า โดยให้ความสูงไหลตามเนื้อหา (height: auto)
   แล้วใช้คำสั่ง break-after แทนการล็อกความสูงตายตัว
*/
@media print{
  @page { size: 8.5in 13in portrait; margin: 0; }
  html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; width: 100% !important; height: auto !important; }
  body::before { display: none !important; }
  body > *:not(.main) { display: none !important; }
  .main { display: block !important; margin: 0 !important; padding: 0 !important; max-width: none !important; border: none !important; }
  .main > *:not(#tab-preview) { display: none !important; }
  #tab-preview { display: block !important; }
  #tab-preview > *:not(#previewLayout) { display: none !important; }
  #previewLayout { display: block !important; grid-template-columns: 1fr !important; gap: 0 !important; }
  .editor-panel, .empty-state { display: none !important; }
  
  #paperWrap { 
    display: block !important; 
    padding: 0 !important; 
    margin: 0 !important; 
    border: none !important; 
    background: transparent !important; 
    box-shadow: none !important; 
    overflow: visible !important; 
    max-height: none !important; 
    height: auto !important; 
  }
  
  .paper { 
    background: #fff !important; 
    color: #000 !important; 
    width: 100% !important; 
    height: auto !important; /* ป้องกันเนื้อหาปลิ้นจนเกิดหน้าว่าง */
    max-height: 100vh !important;
    padding: 54px 62px !important; 
    margin: 0 !important; 
    box-shadow: none !important; 
    border-radius: 0 !important; 
    transform: none !important; 
    page-break-inside: avoid !important;
    page-break-after: always !important; 
    break-after: page !important; 
    position: relative !important; 
    overflow: hidden !important; 
    box-sizing: border-box !important; 
  }
  
  .paper:last-child { 
    page-break-after: auto !important; /* หน้าสุดท้ายไม่ต้องขึ้นหน้าใหม่ ป้องกันหน้าเปล่าปิดท้าย */
    break-after: auto !important; 
  }

  .exam-cols { column-count: 2 !important; column-gap: 24px !important; column-rule: 1px solid #999 !important; }
  .exam-single { column-count: 1 !important; }
  .q-block { break-inside: avoid !important; page-break-inside: avoid !important; }
}

.w-name-row{display:flex;gap:24px;align-items:center;margin-bottom:14px;font-size:21px}
.w-blank{display:inline-block;border-bottom:1.5px solid #000;vertical-align:bottom}
.w-part-head{font-size:21px;font-weight:bold;margin-bottom:4px}
.w-pts{font-weight:normal;font-size:18px}
.w-directions{font-size:19px;margin-bottom:10px}
.w-topics-box{margin-bottom:14px;padding:10px 14px;border:1px solid #bbb;border-radius:4px}
.w-topic{font-size:18px;margin-bottom:4px;line-height:1.5}
.w-lines-box{display:flex;flex-direction:column;gap:0}
.w-line{border-bottom:1px solid #999;height:32px;width:100%}

.col-toggle-wrap{margin-top:6px}
.col-toggle-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:block}
.col-toggle-group{display:flex;gap:12px}
.col-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 10px;border-radius:12px;cursor:pointer;border:2px solid var(--border);background:rgba(0,0,0,.2);transition:all .2s;position:relative;}
.col-opt input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.col-opt:hover{border-color:rgba(232,184,75,.4);background:rgba(232,184,75,.06)}
.col-opt.active{border-color:var(--accent);background:rgba(232,184,75,.12)}
.col-opt-text{font-size:14px;font-weight:600;color:var(--text2)}
.col-opt.active .col-opt-text{color:var(--accent)}
.col-preview{width:48px;height:36px;background:#fff;border-radius:4px;display:flex;gap:4px;padding:5px;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.col-preview span{flex:1;background:#d0d7e3;border-radius:2px;background:repeating-linear-gradient(0deg,#c8d0de,#c8d0de 2px,transparent 2px,transparent 4px);}
.col-preview-1{flex-direction:column;gap:3px}
.col-preview-1 span{flex:none;height:5px;width:100%}

.btn-row{display:flex;gap:12px}
.btn-row .btn-convert{flex:1}
.btn-cancel{padding:16px 22px;background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:12px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-cancel:hover{background:rgba(248,113,113,.22);border-color:rgba(248,113,113,.5)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ว</div>
  <div>
    <div class="topbar-title">ระบบแปลงข้อสอบวิชาการ</div>
    <div class="topbar-sub">โรงเรียนพระมารดานิจจานุเคราะห์</div>
  </div>
  <div class="topbar-gem">Gemini AI</div>
  <button id="btnPrintTop" onclick="window.print()">🖨 พิมพ์ / PDF</button>
</div>

<div class="tabs">
  <button class="tab active" id="tabUpload" onclick="switchTab('upload',this)">📁 อัพโหลดไฟล์</button>
  <button class="tab" onclick="switchTab('preview',this)" id="tabPreview">
    📄 ตัวอย่างข้อสอบ <span class="badge" id="qBadge">0</span>
  </button>
</div>

<div class="main">
  <div id="tab-upload" class="tab-panel active">
    <div class="grid2">
      <div class="card">
        <div class="card-title">
          <div class="card-icon">📂</div>
          อัพโหลดไฟล์ข้อสอบ
        </div>
        <div class="upload-zone" id="uploadZone"
          ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
          <input type="file" id="fileIn" accept=".docx,.doc,.txt,.pdf" onchange="onFileChange(this)">
          <div class="upload-zone-icon">📂</div>
          <div class="upload-zone-title">คลิกที่นี่เพื่อเลือกไฟล์</div>
          <div class="upload-zone-sub">รองรับ .pdf · .docx · .txt</div>
          <div class="upload-zone-pill">📁 เปิดไฟล์</div>
        </div>
        <div class="file-status" id="fileStatus">
          <span style="font-size:24px">✅</span>
          <div style="flex:1;overflow:hidden">
            <div class="file-status-name" id="fileName"></div>
            <div class="file-status-meta" id="fileMeta"></div>
          </div>
        </div>
        <button class="text-toggle" id="textToggle" onclick="toggleText()">
          <span id="toggleArrow">▶</span> ดูข้อความที่อ่านได้
        </button>
        <div class="text-box" id="textBox"></div>
        <div class="btn-row">
          <button class="btn-convert" id="btnConvert" disabled onclick="convertExam()">
            ✨ แปลงข้อสอบด้วย AI
          </button>
          <button class="btn-cancel" id="btnCancel" style="display:none" onclick="cancelConvert()">
            ✕ ยกเลิก
          </button>
        </div>
        <div class="err-msg" id="errMsg"></div>
      </div>

      <div class="card">
        <div class="card-title">
          <div class="card-icon">⚙️</div>
          ข้อมูลหัวข้อสอบ
        </div>
        <div class="form-fields">
          <div class="field">
            <label class="field-label">ชื่อโรงเรียน</label>
            <input type="text" id="f_school" value="โรงเรียนพระมารดานิจจานุเคราะห์">
          </div>
          <div class="field-row">
            <div class="field">
              <label class="field-label">ประเภทการสอบ</label>
              <input type="text" id="f_type" value="ปลายภาคเรียนที่ 2">
            </div>
            <div class="field">
              <label class="field-label">ปีการศึกษา</label>
              <input type="text" id="f_year" value="2568">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label class="field-label">ระดับชั้น</label>
              <input type="text" id="f_grade" value="มัธยมศึกษาปีที่ 4">
            </div>
            <div class="field">
              <label class="field-label">เวลาสอบ (นาที)</label>
              <input type="text" id="f_time" value="50">
            </div>
          </div>
          <div class="field">
            <label class="field-label">วิชา</label>
            <input type="text" id="f_subject" value="คริสต์ศาสนา">
          </div>
          <div class="field">
            <label class="field-label">คำชี้แจง</label>
            <input type="text" id="f_inst" value="ให้นักเรียนอ่านและคิดพิจารณา แล้วเลือกตัวเลือกที่ถูกต้องที่สุดเพียงคำตอบเดียว">

/* ─── Tab switching ─────────────────────────────────── */
function switchTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  DOMHelper.get('tab-' + name).classList.add('active');
  el.classList.add('active');
  DOMHelper.get('btnPrintTop').style.display = (name === 'preview' && AppState.questions.length > 0) ? 'flex' : 'none';
  if (name === 'preview') requestAnimationFrame(scalePaper);

/* ─── Drag & Drop ────────────────────────────────────── */
function onDragOver(e) { e.preventDefault(); DOMHelper.get('uploadZone').classList.add('over'); }
function onDragLeave() { DOMHelper.get('uploadZone').classList.remove('over'); }
function onDrop(e) {
  e.preventDefault();
  DOMHelper.get('uploadZone').classList.remove('over');
  DOMHelper.get('fileIn').value = '';
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
}
function onFileChange(inp) { if (inp.files[0]) readFile(inp.files[0]); }

/* ─── File reading (รองรับ PDF) ─────────────────────── */
function readFile(file) {
  showStatus(file.name, 'กำลังอ่านไฟล์...');
  showErr('');
  const reader = new FileReader();
  const name = file.name.toLowerCase();

  // จัดการไฟล์ Text
  if (name.endsWith('.txt')) {
    reader.onload = e => { AppState.rawText = e.target.result; onReady(file); };
    reader.onerror = () => showErr('อ่านไฟล์ไม่ได้');
    reader.readAsText(file, 'utf-8');
  } 
  // จัดการไฟล์ PDF
  else if (name.endsWith('.pdf')) {
    reader.onload = async e => {
      try {
        if (typeof pdfjsLib === 'undefined') throw new Error('โหลด PDF.js ไม่ได้');
        
        // กำหนด Worker สำหรับสกัดข้อความ
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const typedarray = new Uint8Array(e.target.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let text = '';
        
        // ลูปอ่านทีละหน้า
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n';
        }
        
        AppState.rawText = text;
        onReady(file);
      } catch (err) {
        showErr('อ่าน PDF ไม่ได้: ' + err.message);
      }
    };
    reader.onerror = () => showErr('อ่านไฟล์ไม่ได้');
    reader.readAsArrayBuffer(file);
  } 
  // จัดการไฟล์ Word (Docx)
  else {
    reader.onload = e => {
      if (typeof mammoth === 'undefined') return showErr('โหลด mammoth.js ไม่ได้ กรุณาใช้ .txt หรือ .pdf แทน');
      mammoth.extractRawText({ arrayBuffer: e.target.result })
        .then(res => { AppState.rawText = res.value; onReady(file); })
        .catch(err => showErr('อ่าน .docx ไม่ได้: ' + err.message));
    };
    reader.onerror = () => showErr('อ่านไฟล์ไม่ได้');
    reader.readAsArrayBuffer(file);
  }
}

function onReady(file) {
  if (!AppState.rawText || !AppState.rawText.trim()) return showErr('ไม่พบข้อความในไฟล์');
  const lines = AppState.rawText.split('\n').filter(l => l.trim()).length;
  showStatus(file.name, (file.size / 1024).toFixed(1) + ' KB · พร้อมแปลง ✓');
  DOMHelper.get('textBox').textContent = AppState.rawText.slice(0, 800) + (AppState.rawText.length > 800 ? '…' : '');
  DOMHelper.get('textToggle').style.display = 'flex';
  DOMHelper.get('btnConvert').disabled = false;
}

function showStatus(name, meta) {
  DOMHelper.get('fileStatus').style.display = 'flex';
  DOMHelper.get('fileName').textContent = name;
  DOMHelper.get('fileMeta').textContent = meta;
}

function toggleText() {
  AppState.textOpen = !AppState.textOpen;
  DOMHelper.get('textBox').style.display = AppState.textOpen ? 'block' : 'none';
  DOMHelper.get('toggleArrow').textContent = AppState.textOpen ? '▼' : '▶';
}

/* ─── JSON repair ────────────────────────────────────── */
function repairJSON(str) {
  try { JSON.parse(str); return str; } catch (e) {}
  const arrStart = str.indexOf('[', str.indexOf('"questions"'));
  if (arrStart === -1) throw new Error('ไม่พบ questions array ใน response');
  const goodObjects = [];
  let i = arrStart + 1;
  while (i < str.length) {
    while (i < str.length && /[\s,]/.test(str[i])) i++;
    if (i >= str.length || str[i] !== '{') break;
    let depth = 0, inStr = false, esc = false, start = i, j = i;
    for (; j < str.length; j++) {
      const c = str[j];
      if (esc) { esc = false; continue; }
      if (c === '\\' && inStr) { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (!inStr) { if (c === '{') depth++; else if (c === '}') { depth--; if (depth === 0) break; } }
    }
    if (depth === 0 && j < str.length) {
      try {
        const obj = JSON.parse(str.slice(start, j + 1));
        if (obj.no !== undefined || obj.question !== undefined) {
          goodObjects.push({ no: obj.no || goodObjects.length + 1, question: obj.question || '', a: obj.a || '', b: obj.b || '', c: obj.c || '', d: obj.d || '', answer: obj.answer || '' });
        }
      } catch (e) {}
      i = j + 1;
    } else break;
  }
  if (goodObjects.length === 0) throw new Error('ไม่พบข้อสอบที่สมบูรณ์ใน response');
  return JSON.stringify({ questions: goodObjects });
}

/* ─── AI conversion ──────────────────────────────────── */
async function convertExam() {
  if (!AppState.rawText) return;
  const btn = DOMHelper.get('btnConvert');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> AI กำลังวิเคราะห์ข้อสอบ...';
  DOMHelper.get('btnCancel').style.display = 'flex';
  AppState.abortCtrl = new AbortController();
  showErr('');

  const prompt = `คุณคือระบบแปลงข้อสอบ ให้ดึงข้อสอบจากข้อความด้านล่างและตอบกลับเป็น JSON อย่างเดียว\nห้ามมี markdown ห้ามมีข้อความอื่นนอกจาก JSON\nรูปแบบ: {"questions":[{"no":1,"question":"คำถาม","a":"ตัวเลือก","b":"ตัวเลือก","c":"ตัวเลือก","d":"ตัวเลือก","answer":"ก"}]}\nกฎ: ดึงทุกข้อ, answer="" ถ้าไม่มีเฉลย, ตัวเลือกไม่ต้องมีตัวอักษรนำหน้า\n\nข้อสอบ:\n${AppState.rawText}`;

  try {
    const res = await fetch(AppState.apiUrl + '?key=' + AppState.apiKey, {
      method: 'POST',
      signal: AppState.abortCtrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.1, maxOutputTokens: 65536 } })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const candidate = data.candidates?.[0];
    if (!candidate) throw new Error('AI ไม่ส่ง response กลับมา');
    
    let raw = candidate.content?.parts?.[0]?.text || '';
    raw = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    const s = raw.indexOf('{');
    if (s === -1) throw new Error('AI ไม่ส่ง JSON กลับมา');
    
    const parsed = JSON.parse(repairJSON(raw.slice(s)));
    AppState.questions = parsed.questions || [];
    if (!AppState.questions.length) throw new Error('ไม่พบข้อสอบในไฟล์');

    const badge = DOMHelper.get('qBadge');
    badge.textContent = AppState.questions.length;
    badge.style.display = 'inline';

    DOMHelper.get('emptyState').style.display = 'none';
    DOMHelper.get('previewLayout').style.display = 'grid';

    renderAll();
    switchTab('preview', DOMHelper.get('tabPreview'));
    DOMHelper.get('btnPrintTop').style.display = 'flex';
  } catch (e) {
    if (e.name === 'AbortError') showErr('ยกเลิกการแปลงแล้ว');
    else showErr('แปลงไม่ได้: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ แปลงข้อสอบด้วย AI';
    DOMHelper.get('btnCancel').style.display = 'none';
    AppState.abortCtrl = null;
  }
}

/* ─── Render Pipeline (DocumentFragment) ─────────────── */
let _renderTimer = null;
function renderAll() { renderEditor(); schedulePaperRender(); }
function schedulePaperRender() {
  if (_renderTimer) cancelAnimationFrame(_renderTimer);
  _renderTimer = requestAnimationFrame(() => { renderPaper(); _renderTimer = null; });
}

function renderEditor() {
  const list = DOMHelper.get('qList');
  list.innerHTML = '';
  const frag = document.createDocumentFragment();

  AppState.questions.forEach((q, i) => {
    const d = DOMHelper.create('div', 'q-item');
    
    const head = DOMHelper.create('div', 'q-head');
    head.onclick = () => toggleQ(i);
    head.innerHTML = `<span class="q-num">${q.no}</span><span class="q-snip">${esc(q.question) || '(ว่าง)'}</span>`;
    const btnDel = DOMHelper.create('button', 'btn-del');
    btnDel.textContent = '×';
    btnDel.onclick = (e) => { e.stopPropagation(); delQ(i); };
    head.appendChild(btnDel);
    
    const body = DOMHelper.create('div', `q-body${AppState.openIdx === i ? ' open' : ''}`);
    ['question','a','b','c','d','answer'].forEach(f => {
      const fDiv = DOMHelper.create('div', 'q-field');
      const lblMap = { question:'คำถาม', a:'ก', b:'ข', c:'ค', d:'ง', answer:'เฉลย' };
      fDiv.innerHTML = `<label>${lblMap[f]}</label>`;
      const inp = document.createElement('input');
      inp.value = q[f] || '';
      inp.oninput = (e) => updateQ(i, f, e.target.value);
      fDiv.appendChild(inp);
      body.appendChild(fDiv);
    });

    d.appendChild(head);
    d.appendChild(body);
    frag.appendChild(d);
  });
  list.appendChild(frag);
}

function buildQNode(q) {
  const block = DOMHelper.create('div', 'q-block');
  const txt = DOMHelper.create('div', 'q-text');
  txt.textContent = `${q.no}. ${q.question}`;
  block.appendChild(txt);

  const choices = DOMHelper.create('div', 'q-choices');
  ['a', 'b', 'c', 'd'].forEach((key, idx) => {
    if (q[key]) {
      const cDiv = DOMHelper.create('div', 'q-choice');
      const prefix = ['ก', 'ข', 'ค', 'ง'][idx];
      cDiv.textContent = `${prefix}. ${q[key]}`;
      choices.appendChild(cDiv);
    }
  });
  block.appendChild(choices);
  return block;
}

function measureHeights() {
  let probe = DOMHelper.get('_probe');
  if (!probe) { probe = DOMHelper.create('div'); probe.id = '_probe'; document.body.appendChild(probe); }
  const colW = (816 - 124 - 24) / 2;
  probe.style.cssText = `position:absolute;visibility:hidden;pointer-events:none;top:-9999px;left:0;width:${AppState.twoCol ? colW : 692}px;font-family:Sarabun,sans-serif;font-size:21px;line-height:1.5;box-sizing:border-box;padding-left:2.2em`;
  probe.innerHTML = '';
  
  const frag = document.createDocumentFragment();
  const nodes = AppState.questions.map(q => {
    const node = buildQNode(q);
    frag.appendChild(node);
    return node;
  });
  probe.appendChild(frag);
  return nodes.map(n => n.offsetHeight + 10);
}

function renderPaper() {
  const v = id => DOMHelper.get(id).value;
  const meta = { school: v('f_school'), type: v('f_type'), year: v('f_year'), grade: v('f_grade'), subject: v('f_subject'), time: v('f_time'), inst: v('f_inst'), total: AppState.questions.length };
  
  const heights = measureHeights();
  const pages = [];
  let pageNo = 1, isFirst = true, pageQs = [], sumH = 0;
  
  AppState.questions.forEach((q, i) => {
    const h = heights[i] || 60;
    const newSumH = sumH + h;
    const effectiveH = AppState.twoCol ? Math.ceil(newSumH / 2) : newSumH;
    
    if (pageQs.length > 0 && effectiveH > (1144 - (isFirst ? 130 : 56) - 36)) {
      pages.push({ pageNo, isFirst, qs: [...pageQs] });
      pageNo++; isFirst = false; pageQs = []; sumH = 0;
    }
    pageQs.push(q); sumH += h;
  });
  if (pageQs.length > 0) pages.push({ pageNo, isFirst, qs: pageQs });

  const wrap = DOMHelper.get('paperWrap');
  wrap.innerHTML = '';
  const rootFrag = document.createDocumentFragment();

  pages.forEach(p => {
    const paper = DOMHelper.create('div', 'paper');
    if (p.isFirst) {
      paper.innerHTML = `<div class="p-school">${esc(meta.school)}</div>
        <div class="p-row"><span>ข้อสอบ${esc(meta.type)}</span><span>ปีการศึกษา ${esc(meta.year)}</span><span>ชั้น${esc(meta.grade)}</span></div>
        <div class="p-row bdr"><span>วิชา ${esc(meta.subject)}</span><span>จำนวน ${meta.total} ข้อ</span><span>เวลา ${esc(meta.time)} นาที</span></div>
        <div class="p-inst">คำชี้แจง : ${esc(meta.inst)}</div>`;
    } else {
      paper.innerHTML = `<div class="p-subhead"><span>วิชา ${esc(meta.subject)}</span><span>ชั้น${esc(meta.grade)}</span><span>หน้า ${p.pageNo}</span></div><div class="p-subhead-line"></div>`;
    }
    const cols = DOMHelper.create('div', AppState.twoCol ? 'exam-cols' : 'exam-single');
    p.qs.forEach(q => cols.appendChild(buildQNode(q)));
    paper.appendChild(cols);
    rootFrag.appendChild(paper);
  });

  if (AppState.showWriting) {
    const wPaper = DOMHelper.create('div', 'paper');
    wPaper.innerHTML = `<div class="p-subhead"><span>วิชา ${esc(meta.subject)}</span><span>ชั้น${esc(meta.grade)}</span><span>หน้าเขียนตอบ</span></div><div class="p-subhead-line"></div>
      <div class="w-name-row"><span>Name: <span class="w-blank" style="width:22
