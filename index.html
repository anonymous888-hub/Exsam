<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแปลงข้อสอบ — โรงเรียนพระมารดานิจจานุเคราะห์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/utif2@4.1.0/UTIF.js"></script>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<style>
:root {
  --navy: #0a1628;
  --accent: #e8b84b;
  --accent2: #f5d07a;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --text: #e8eaf0;
  --text2: #8892a4;
  --green: #4ade80;
  --red: #f87171;
  --r: 14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(30,58,95,.6),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 100%,rgba(232,184,75,.07),transparent 50%);pointer-events:none}

.topbar{position:relative;z-index:10;display:flex;align-items:center;gap:14px;padding:14px 24px;background:rgba(10,22,40,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(232,184,75,.3);overflow:hidden;padding:0}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-gem{margin-left:auto;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.3);color:var(--accent);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.topbar-gem::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
#btnPrintTop{display:none;margin-left:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;box-shadow:0 4px 12px rgba(232,184,75,.3);transition:all .2s}
#btnPrintTop:hover{transform:translateY(-1px)}

.tabs{position:relative;z-index:10;display:flex;gap:4px;padding:12px 24px 0;background:rgba(10,22,40,.5)}
.tab{padding:10px 20px;border:none;border-radius:10px 10px 0 0;background:transparent;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text);background:var(--glass)}
.tab.active{color:var(--text);background:rgba(255,255,255,.07);border-bottom:2px solid var(--accent)}
.badge{background:var(--accent);color:var(--navy);border-radius:12px;padding:1px 7px;font-size:11px;font-weight:700;display:none}

.main{position:relative;z-index:5;max-width:1200px;margin:0 auto;padding:24px}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.grid2{grid-template-columns:1fr}.main{padding:14px}}

.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:22px;backdrop-filter:blur(10px)}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-icon{width:26px;height:26px;background:rgba(232,184,75,.14);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}

.upload-zone{position:relative;border:2.5px dashed rgba(232,184,75,.5);border-radius:var(--r);background:linear-gradient(135deg,rgba(232,184,75,.1),rgba(232,184,75,.04));padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:linear-gradient(135deg,rgba(232,184,75,.18),rgba(232,184,75,.08));transform:scale(1.01)}
.upload-zone input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3}
.upload-zone-icon{font-size:40px;margin-bottom:10px;line-height:1}
.upload-zone-title{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:6px}
.upload-zone-sub{font-size:13px;color:var(--text2);margin-bottom:14px}
.upload-zone-pill{display:inline-block;background:var(--accent);color:var(--navy);font-size:14px;font-weight:700;padding:9px 28px;border-radius:25px;box-shadow:0 4px 14px rgba(232,184,75,.4);pointer-events:none}

.file-status{display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.22);border-radius:10px;margin-bottom:12px}
.file-status-name{font-size:13px;font-weight:700;color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.file-status-meta{font-size:11px;color:var(--text2)}

.text-toggle{display:none;background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif;padding:4px 0;align-items:center;gap:5px;margin-bottom:6px}
.text-toggle:hover{color:var(--text)}
.text-box{display:none;max-height:110px;overflow-y:auto;background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;font-size:11px;line-height:1.7;color:var(--text2);white-space:pre-wrap;margin-bottom:12px}

.spell-result-box { display: none; background: rgba(0,0,0,.2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; font-size: 13px; color: var(--text); }
.spell-change-item { display: flex; gap: 8px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.05); }
.spell-change-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.spell-orig { color: var(--red); text-decoration: line-through; flex-shrink: 0; }

.spell-edit-input { flex:1; background: rgba(10,22,40,.4); border: 1px solid rgba(74,222,128,.3); color: var(--green); border-radius: 6px; padding: 6px 10px; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: bold; outline: none; transition: all 0.2s; }
.spell-edit-input:focus { border-color: var(--green); background: rgba(74,222,128,.1); }
.btn-revert { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--red); border-radius: 6px; cursor: pointer; font-size: 12px; padding: 6px 12px; font-family: 'Sarabun', sans-serif; transition: all 0.2s; white-space: nowrap; }
.btn-revert:hover { background: rgba(248,113,113,.25); border-color: var(--red); }

.btn-row{display:flex;flex-direction:column;gap:10px}
.btn-group-row{display:flex;gap:10px;width:100%}
.btn-group-row .btn-convert{flex:1}
.btn-convert{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 5px 18px rgba(232,184,75,.25)}
.btn-convert:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,184,75,.35)}
.btn-convert:disabled{background:rgba(255,255,255,.08);color:var(--text2);cursor:not-allowed;box-shadow:none;transform:none}
.btn-cancel{padding:13px 18px;background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-cancel:hover{background:rgba(248,113,113,.22);border-color:rgba(248,113,113,.5)}

.spinner{width:17px;height:17px;border:2.5px solid rgba(10,22,40,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{display:none;margin-top:10px;padding:10px 14px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:8px;color:var(--red);font-size:13px}

.form-fields{display:flex;flex-direction:column;gap:11px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.field input{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'Sarabun',sans-serif;outline:none;transition:border .2s}
.field input:focus{border-color:var(--accent)}
.steps{margin-top:18px;display:flex;flex-direction:column;gap:7px}
.step{display:flex;align-items:center;gap:11px;padding:9px 13px;background:rgba(0,0,0,.2);border-radius:10px;font-size:13px;color:var(--text2);border:1px solid var(--border)}
.step-num{width:23px;height:23px;background:rgba(232,184,75,.14);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0}

.preview-layout{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
@media(max-width:768px){.preview-layout{grid-template-columns:1fr}}
.editor-panel{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-height:calc(100vh - 180px);display:flex;flex-direction:column}
.editor-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.editor-head h4{font-size:13px;color:var(--text2);font-weight:600}
.btn-add-q{background:rgba(232,184,75,.14);border:1px solid rgba(232,184,75,.3);color:var(--accent);border-radius:7px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif}
.q-list{overflow-y:auto;flex:1;padding:10px}
.q-item{margin-bottom:6px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:rgba(0,0,0,.2)}
.q-head{padding:9px 12px;display:flex;align-items:center;cursor:pointer;gap:6px}
.q-head:hover{background:rgba(255,255,255,.03)}
.q-num{background:rgba(232,184,75,.14);color:var(--accent);border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700;flex-shrink:0}
.q-snip{color:var(--text2);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.btn-del{background:none;border:none;cursor:pointer;color:rgba(248,113,113,.45);font-size:16px;padding:0 2px;line-height:1;transition:color .2s}
.btn-del:hover{color:var(--red)}
.q-body{display:none;padding:10px 12px;border-top:1px solid var(--border)}
.q-body.open{display:block}
.q-field{margin-bottom:7px}
.q-field label{display:block;font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.q-field input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'Sarabun',sans-serif;outline:none}
.q-field input:focus{border-color:var(--accent)}
.empty-state{text-align:center;padding:80px 20px;color:var(--text2)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.4}

.paper-wrap{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:18px;overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 180px);-webkit-overflow-scrolling:touch}

/* ══ กระดาษ (หน้าจอปกติ) ══ */
.paper{
  background:#fff;border-radius:6px;color:#000;
  font-family:'TH Sarabun PSK','Sarabun',sans-serif;
  font-size:16px;line-height:1.5;font-weight:normal;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  width:816px;
  height:1344px;
  overflow:hidden;
  padding:54px 62px;
  margin:0 auto 20px auto;
  box-sizing:border-box;position:relative;
  transform-origin:top left;transition:none;
}

.p-school{font-family:'TH Sarabun PSK','Sarabun',sans-serif;font-size:16px;font-weight:bold;text-align:center;margin-bottom:2px;}
.p-row{font-family:'TH Sarabun PSK','Sarabun',sans-serif;font-size:16px;font-weight:bold;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:2px;}
.p-row.bdr{border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}
.p-inst{font-family:'TH Sarabun PSK','Sarabun',sans-serif;font-size:14px;font-weight:normal;text-decoration:none;margin-bottom:12px;}
.p-subhead{font-family:'TH Sarabun PSK','Sarabun',sans-serif;font-size:16px;font-weight:bold;display:flex;justify-content:space-between;margin-bottom:4px;}
.p-subhead-line{border-bottom:2px solid #000;margin-bottom:10px}

.exam-cols{display:flex;gap:0;align-items:flex-start}
.exam-col{flex:1;min-width:0}
.exam-col:first-child{padding-right:12px;border-right:1px solid #ccc}
.exam-col:last-child{padding-left:12px}
.exam-single{display:block}
.q-block{break-inside:avoid;margin-bottom:12px}
.q-text{font-weight:normal;margin-bottom:3px;display:flex;gap:0.3em;}
.q-num-lbl{white-space:nowrap;flex-shrink:0}
.q-text-body{flex:1;min-width:0}
.q-choices{padding-left:1em}
.q-choice{margin:2px 0;display:flex;gap:0.3em;}
.q-choice-lbl{white-space:nowrap;flex-shrink:0}
.q-choice-body{flex:1;min-width:0}

/* ══ PRINT STYLES ขั้นเด็ดขาด V3 ══ */
@media print{
  @page { size: 8.5in 14in portrait; margin: 0; }
  html, body { 
    background: #fff !important; 
    margin: 0 !important; 
    padding: 0 !important; 
    width: 100% !important; 
    height: auto !important; 
    min-height: 0 !important; 
    -webkit-print-color-adjust: exact !important; 
    print-color-adjust: exact !important; 
    overflow: visible !important;
  }
  body > *:not(.main) { display: none !important; }
  body::before { display: none !important; }
  .main > *:not(#tab-preview) { display: none !important; }
  #tab-preview > *:not(#previewLayout) { display: none !important; }
  #previewLayout > *:not(#paperWrap) { display: none !important; }
  .main, #tab-preview, #previewLayout, #paperWrap { 
    display: block !important; 
    margin: 0 !important; 
    padding: 0 !important; 
    width: 100% !important;
    height: auto !important; 
    max-width: none !important; 
    max-height: none !important;
    border: none !important; 
    box-shadow: none !important; 
    background: transparent !important; 
    position: static !important;
    overflow: visible !important; 
  }
  .editor-panel, .empty-state { display: none !important; }
  .paper { 
    background: #fff !important; 
    color: #000 !important; 
    width: 8.5in !important; 
    height: 13.8in !important; 
    max-height: 13.8in !important;
    padding: 54px 62px !important; 
    margin: 0 !important; 
    box-shadow: none !important; 
    border-radius: 0 !important; 
    zoom: 1 !important; 
    transform: none !important;
    transform-origin: top left !important; 
    page-break-inside: avoid !important; 
    page-break-after: always !important; 
    break-after: page !important;
    overflow: hidden !important; 
    box-sizing: border-box !important; 
  }
  .paper:last-child, .paper:last-of-type { 
    page-break-after: avoid !important; 
    break-after: auto !important; 
  }
  .exam-cols { display: flex !important; gap: 0 !important; align-items: flex-start !important; }
  .exam-col { flex: 1 !important; min-width: 0 !important; }
  .exam-col:first-child { padding-right: 12px !important; border-right: 1px solid #999 !important; }
  .exam-col:last-child { padding-left: 12px !important; }
  .exam-single { display: block !important; }
  .q-block { break-inside: avoid !important; page-break-inside: avoid !important; }
  .w-line { border-bottom: 1px solid #999 !important; }
}

.w-name-row{display:flex;gap:24px;align-items:center;margin-bottom:14px;font-size:16px}
.w-blank{display:inline-block;border-bottom:1.5px solid #000;vertical-align:bottom}
.w-part-head{font-size:16px;font-weight:bold;margin-bottom:4px}
.w-pts{font-weight:normal;font-size:14px}
.w-directions{font-size:16px;margin-bottom:10px}
.w-topics-box{margin-bottom:14px;padding:10px 14px;border:1px solid #bbb;border-radius:4px}
.w-topic{font-size:16px;margin-bottom:4px;line-height:1.5}
.w-lines-box{display:flex;flex-direction:column;gap:0}
.w-line{border-bottom:1px solid #999;height:32px;width:100%}

.col-toggle-wrap{margin-top:4px}
.col-toggle-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.col-toggle-group{display:flex;gap:10px}
.col-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 8px;border-radius:10px;cursor:pointer;border:2px solid var(--border);background:rgba(0,0,0,.2);transition:all .2s;position:relative}
.col-opt input[type=radio]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;margin:0}
.col-opt:hover{border-color:rgba(232,184,75,.4);background:rgba(232,184,75,.06)}
.col-opt.active{border-color:var(--accent);background:rgba(232,184,75,.12)}
.col-opt-text{font-size:12px;font-weight:600;color:var(--text2)}
.col-opt.active .col-opt-text{color:var(--accent)}
.col-preview{width:44px;height:32px;background:#fff;border-radius:3px;display:flex;gap:3px;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.col-preview span{flex:1;background:repeating-linear-gradient(0deg,#c8d0de,#c8d0de 2px,transparent 2px,transparent 4px)}
.col-preview-1{flex-direction:column;gap:2px}
.col-preview-1 span{flex:none;height:4px;width:100%}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" style="background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:18px;font-weight:900;color:var(--navy)">ว</div>
  <div>
    <div class="topbar-title">ระบบแปลงข้อสอบวิชาการ</div>
    <div class="topbar-sub">โรงเรียนพระมารดานิจจานุเคราะห์</div>
  </div>
  <div class="topbar-gem">Gemini AI</div>
  <button id="btnPrintTop" onclick="window.print()">🖨 พิมพ์ / PDF</button>
  <button id="btnDocxTop" onclick="exportDocx()" style="display:none;margin-left:6px;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;box-shadow:0 4px 12px rgba(37,99,235,.3);transition:all .2s">💾 บันทึก .docx</button>
</div>

<div class="tabs">
  <button class="tab active" id="tabUpload" onclick="switchTab('upload',this)">📁 อัพโหลดไฟล์</button>
  <button class="tab" onclick="switchTab('preview',this)" id="tabPreview">
    📄 ตัวอย่างข้อสอบ <span class="badge" id="qBadge">0</span>
  </button>
</div>

<div class="main">
  <div id="tab-upload" class="tab-panel active">
    <div class="grid2">
      <div class="card">
        <div class="card-title"><div class="card-icon">📂</div>อัพโหลดไฟล์ข้อสอบ</div>
        <div class="upload-zone" id="uploadZone" ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
          <input type="file" id="fileIn" accept=".docx,.doc,.txt,.pdf" onchange="onFileChange(this)">
          <div class="upload-zone-icon">📂</div>
          <div class="upload-zone-title">คลิกที่นี่เพื่อเลือกไฟล์</div>
          <div class="upload-zone-sub">รองรับ .pdf · .docx · .txt</div>
          <div class="upload-zone-pill">📁 เปิดไฟล์</div>
        </div>
        <div class="file-status" id="fileStatus">
          <span style="font-size:20px">✅</span>
          <div style="flex:1;overflow:hidden">
            <div class="file-status-name" id="fileName"></div>
            <div class="file-status-meta" id="fileMeta"></div>
          </div>
        </div>
        <button class="text-toggle" id="textToggle" onclick="toggleText()"><span id="toggleArrow">▶</span> ดูข้อความที่อ่านได้</button>
        <div class="text-box" id="textBox"></div>
        <div id="spellResult" class="spell-result-box"></div>
        <div class="api-key-row" style="margin-bottom:12px">
          <label style="font-size:12px;color:var(--text2);margin-bottom:5px;display:block">🔑 Gemini API Key</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input type="password" id="apiKeyInput" placeholder="วาง API Key ของคุณที่นี่..." style="flex:1;padding:8px 10px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none" oninput="state.apiKey=this.value.trim();localStorage.setItem('gemini_key',this.value.trim())" onfocus="this.type='text'" onblur="this.type='password'">
            <a href="https://aistudio.google.com/app/apikey" target="_blank" style="font-size:11px;color:var(--accent);white-space:nowrap;text-decoration:none">สร้าง key</a>
          </div>
        </div>
        <div class="btn-row">
          <button id="btnSpellCheck" style="display:none; padding:12px; background:rgba(74,222,128,.15); color:var(--green); border:1px solid rgba(74,222,128,.3); border-radius:10px; font-family:'Sarabun',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s;" onclick="checkSpelling()">🔍 ให้ AI ตรวจและแก้คำผิดก่อนแปลง</button>
          <div class="btn-group-row">
            <button class="btn-convert" id="btnConvert" disabled onclick="convertExam()">✨ แปลงข้อสอบด้วย AI</button>
            <button class="btn-cancel" id="btnCancel" style="display:none" onclick="cancelConvert()">✕ ยกเลิก</button>
          </div>
        </div>
        <div class="err-msg" id="errMsg"></div>
      </div>

      <div class="card">
        <div class="card-title"><div class="card-icon">⚙️</div>ข้อมูลหัวข้อสอบ</div>
        <div class="form-fields">
          <div class="field"><label class="field-label">ชื่อโรงเรียน</label><input type="text" id="f_school" value="โรงเรียนพระมารดานิจจานุเคราะห์"></div>
          <div class="field-row">
            <div class="field"><label class="field-label">ประเภทการสอบ</label><input type="text" id="f_type" value="ปลายภาคเรียนที่ 2"></div>
            <div class="field"><label class="field-label">ปีการศึกษา</label><input type="text" id="f_year" value="2568"></div>
          </div>
          <div class="field-row">
            <div class="field"><label class="field-label">ระดับชั้น</label><input type="text" id="f_grade" value="มัธยมศึกษาปีที่ 4"></div>
            <div class="field"><label class="field-label">เวลาสอบ (นาที)</label><input type="text" id="f_time" value="50"></div>
          </div>
          <div class="field"><label class="field-label">วิชา</label><input type="text" id="f_subject" value="คริสต์ศาสนา"></div>
          <div class="field"><label class="field-label">คำชี้แจง</label><input type="text" id="f_inst" value="ให้นักเรียนอ่านและคิดพิจารณา แล้วเลือกตัวเลือกที่ถูกต้องที่สุดเพียงคำตอบเดียว"></div>
          <div class="col-toggle-wrap">
            <div class="col-toggle-label">รูปแบบการจัดหน้า</div>
            <div class="col-toggle-group">
              <label class="col-opt active" id="opt2col"><input type="radio" name="colLayout" value="2" checked onchange="onLayoutChange(this)"><span class="col-preview col-preview-2"><span></span><span></span></span><span class="col-opt-text">2 คอลัมน์</span></label>
              <label class="col-opt" id="opt1col"><input type="radio" name="colLayout" value="1" onchange="onLayoutChange(this)"><span class="col-preview col-preview-1"><span></span></span><span class="col-opt-text">1 คอลัมน์</span></label>
            </div>
          </div>
        </div>
        <div class="col-toggle-wrap" style="margin-top:14px">
          <div class="col-toggle-label">หน้าเขียนตอบ (Part II)</div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:10px">
            <input type="checkbox" id="chkWriting" onchange="onWritingToggle(this)" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer">
            <span style="font-size:13px;color:var(--text1)">เพิ่มหน้าเขียนตอบท้ายข้อสอบ</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-preview" class="tab-panel">
    <div class="empty-state" id="emptyState"><div class="empty-icon">📋</div><div>ยังไม่มีข้อสอบ</div></div>
    <div class="preview-layout" id="previewLayout" style="display:none">
      <div class="editor-panel">
        <div class="editor-head"><h4>✏️ แก้ไขข้อสอบ</h4><button class="btn-add-q" onclick="addQ()">+ เพิ่มข้อ</button></div>
        <div class="q-list" id="qList"></div>
        <div style="padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0">
          <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📏 กั้นล่าง (margin-bottom)</div>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="range" id="sliderBottom" min="0" max="300" step="5" value="20" style="flex:1;accent-color:var(--accent);cursor:pointer" oninput="state.bottomMargin=+this.value;document.getElementById('lblBottom').textContent=this.value+'px';schedulePaperRender()">
            <span id="lblBottom" style="font-size:13px;font-weight:700;color:var(--accent);width:44px;text-align:right">20px</span>
          </div>
        </div>
      </div>
      <div id="paperWrap" class="paper-wrap"></div>
    </div>
  </div>
</div>

<script>
const state = {
  apiKey: localStorage.getItem('gemini_key') || '',
  apiUrl: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
  rawText: '', questions: [], currentChanges: [], openIdx: null, textOpen: false,
  twoCol: true, abortCtrl: null, showWriting: false, writingTopics: [], writingLines: 12,
  writingPoints: 10, writingWords: 150, bottomMargin: 20, docxImages: {}, mathStore: {}, pdfImages: []
};

function switchTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('btnPrintTop').style.display = (name === 'preview' && state.questions.length > 0) ? 'flex' : 'none';
  document.getElementById('btnDocxTop').style.display = (name === 'preview' && state.questions.length > 0) ? 'flex' : 'none';
  if (name === 'preview') requestAnimationFrame(scalePaper);
}

function onDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('over'); }
function onDragLeave() { document.getElementById('uploadZone').classList.remove('over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
}
function onFileChange(inp) { if (inp.files[0]) readFile(inp.files[0]); inp.value = ''; }

async function readFile(file) {
  showStatus(file.name, 'กำลังอ่านไฟล์...');
  state.docxImages = {}; state.pdfImages = []; state.rawText = '';
  const reader = new FileReader();
  const name = file.name.toLowerCase();

  if (name.endsWith('.docx')) {
    reader.onload = async e => {
      const zip = await JSZip.loadAsync(e.target.result);
      // Extract Images
      const media = zip.folder("word/media");
      if (media) {
        let idx = 1;
        for (let filename in media.files) {
          const fileData = media.files[filename];
          const b64 = await fileData.async("base64");
          const ext = filename.split('.').pop().toLowerCase();
          state.docxImages[`IMG_${idx}`] = `data:image/${ext};base64,${b64}`;
          idx++;
        }
      }
      // Extract Text with placeholders
      const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
      let text = result.value;
      // เพิ่ม Logic จำลองตำแหน่งรูปภาพ (Mammoth พื้นฐานไม่บอกตำแหน่งรูปเป๊ะๆ)
      // เราจะใส่ [IMAGE:IMG_X] ต่อท้ายข้อความที่มีแนวโน้มว่าจะมีรูป
      state.rawText = text;
      onReady(file);
    };
    reader.readAsArrayBuffer(file);
  } else if (name.endsWith('.pdf')) {
    reader.onload = async e => {
      const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
      let fullText = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(s => s.str).join(" ") + "\n";
      }
      state.rawText = fullText;
      onReady(file);
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => { state.rawText = e.target.result; onReady(file); };
    reader.readAsText(file);
  }
}

function onReady(file) {
  showStatus(file.name, 'พร้อมแปลงข้อสอบ ✓');
  document.getElementById('btnConvert').disabled = false;
  document.getElementById('textBox').textContent = state.rawText.slice(0, 500) + "...";
  document.getElementById('textToggle').style.display = 'block';
}

async function convertExam() {
  const btn = document.getElementById('btnConvert');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> AI กำลังประมวลผล...';
  
  const prompt = `คุณคือระบบแปลงข้อสอบ ทำหน้าที่ดึงข้อสอบจากข้อความและจัดรูปแบบเป็น JSON
กฎสำคัญ:
1. ดึงข้อสอบทุกข้อ
2. หากในข้อความมีรูปภาพหรือสัญลักษณ์ [IMAGE:IMG_X] ให้ใส่ชื่อ IMG_X ในฟิลด์ image
3. ตอบกลับเป็น JSON ในรูปแบบนี้เท่านั้น: {"questions":[{"no":1,"question":"โจทย์","image":"IMG_1 หรือว่าง","a":"ตัวเลือก ก","b":"ข","c":"ค","d":"ง","answer":"ก"}]}
4. ห้ามตอบอย่างอื่นนอกจาก JSON

ข้อความข้อสอบ:
${state.rawText}`;

  try {
    const res = await fetch(`${state.apiUrl}?key=${state.apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    const rawJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
    state.questions = JSON.parse(rawJson).questions;
    renderAll();
    switchTab('preview', document.getElementById('tabPreview'));
  } catch (e) {
    showErr('การแปลงล้มเหลว: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ แปลงข้อสอบด้วย AI';
  }
}

function renderAll() { renderEditor(); schedulePaperRender(); }

function schedulePaperRender() {
  if (_renderTimer) cancelAnimationFrame(_renderTimer);
  _renderTimer = requestAnimationFrame(() => { renderPaper(); renderMath(); _renderTimer = null; });
}

function renderEditor() {
  const list = document.getElementById('qList');
  list.innerHTML = state.questions.map((q, i) => `
    <div class="q-item">
      <div class="q-head" onclick="toggleQ(${i})"><span class="q-num">${q.no}</span><span class="q-snip">${esc(q.question)}</span></div>
      <div class="q-body ${state.openIdx === i ? 'open' : ''}">
        <div class="q-field"><label>โจทย์</label><input value="${esc(q.question)}" oninput="updateQ(${i},'question',this.value)"></div>
        <div class="q-field"><label>รูปภาพ (Key)</label><input value="${esc(q.image)}" oninput="updateQ(${i},'image',this.value)"></div>
        <div class="q-field"><label>ก</label><input value="${esc(q.a)}" oninput="updateQ(${i},'a',this.value)"></div>
        <div class="q-field"><label>ข</label><input value="${esc(q.b)}" oninput="updateQ(${i},'b',this.value)"></div>
        <div class="q-field"><label>ค</label><input value="${esc(q.c)}" oninput="updateQ(${i},'c',this.value)"></div>
        <div class="q-field"><label>ง</label><input value="${esc(q.d)}" oninput="updateQ(${i},'d',this.value)"></div>
      </div>
    </div>`).join('');
}

function renderPaper() {
  const v = id => document.getElementById(id).value;
  const meta = { school: v('f_school'), type: v('f_type'), year: v('f_year'), grade: v('f_grade'), subject: v('f_subject'), time: v('f_time'), inst: v('f_inst'), total: state.questions.length };
  const wrap = document.getElementById('paperWrap');
  wrap.innerHTML = `<div class="paper">
    <div class="p-school">${esc(meta.school)}</div>
    <div class="p-row"><span>ข้อสอบ${esc(meta.type)}</span><span>ปีการศึกษา ${esc(meta.year)}</span><span>ชั้น${esc(meta.grade)}</span></div>
    <div class="p-row bdr"><span>วิชา ${esc(meta.subject)}</span><span>จำนวน ${meta.total} ข้อ</span><span>เวลา ${esc(meta.time)} นาที</span></div>
    <div class="p-inst">คำชี้แจง : ${esc(meta.inst)}</div>
    ${state.questions.map(q => `
      <div class="q-block">
        <div class="q-text"><b>${q.no}.</b> ${esc(q.question)}</div>
        ${q.image && state.docxImages[q.image] ? `<img src="${state.docxImages[q.image]}" style="max-width:200px; display:block; margin:10px 0;">` : ''}
        <div class="q-choices" style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px; padding-left: 20px;">
          <div>ก. ${esc(q.a)}</div><div>ข. ${esc(q.b)}</div>
          <div>ค. ${esc(q.c)}</div><div>ง. ${esc(q.d)}</div>
        </div>
      </div>
    `).join('')}
  </div>`;
  requestAnimationFrame(scalePaper);
}

function scalePaper() {
  const wrap = document.getElementById('paperWrap');
  const paper = wrap.querySelector('.paper');
  if (!paper) return;
  const scale = (wrap.clientWidth - 40) / 816;
  paper.style.transform = `scale(${scale})`;
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleQ(i) { state.openIdx = (state.openIdx === i) ? null : i; renderEditor(); }
function updateQ(i, f, v) { state.questions[i][f] = v; schedulePaperRender(); }
function showStatus(n, m) { document.getElementById('fileStatus').style.display = 'flex'; document.getElementById('fileName').textContent = n; document.getElementById('fileMeta').textContent = m; }
function showErr(m) { const e = document.getElementById('errMsg'); e.textContent = m; e.style.display = 'block'; }
function onWritingToggle(c) { state.showWriting = c.checked; schedulePaperRender(); }
function toggleText() { state.textOpen = !state.textOpen; document.getElementById('textBox').style.display = state.textOpen ? 'block' : 'none'; }
</script>
</body>
</html>
